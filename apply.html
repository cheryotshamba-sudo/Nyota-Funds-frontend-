<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYOTA Fund Kenya - Application</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b6b0b;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:25px;
}

label{
display:block;
margin-top:18px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:25px;
background:#1565c0;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>NYOTA Fund Application</h1>

<p>Please complete all fields below.</p>

<form onsubmit="submitApplication(event)">

<label>Full Name</label>
<input type="text" id="applicantName" placeholder="Enter your full name" required>

<label>National ID Number</label>
<input type="number" placeholder="Enter your ID Number" required>

<label>Phone Number</label>
<input type="tel" placeholder="07XXXXXXXX" required>

<label>County</label>

<select required>

<option value="">Select County</option>

<option>Baringo</option>
<option>Bomet</option>
<option>Bungoma</option>
<option>Busia</option>
<option>Elgeyo-Marakwet</option>
<option>Embu</option>
<option>Garissa</option>
<option>Homa Bay</option>
<option>Isiolo</option>
<option>Kajiado</option>
<option>Kakamega</option>
<option>Kericho</option>
<option>Kiambu</option>
<option>Kilifi</option>
<option>Kirinyaga</option>
<option>Kisii</option>
<option>Kisumu</option>
<option>Kitui</option>
<option>Kwale</option>
<option>Laikipia</option>
<option>Lamu</option>
<option>Machakos</option>
<option>Makueni</option>
<option>Mandera</option>
<option>Marsabit</option>
<option>Meru</option>
<option>Migori</option>
<option>Mombasa</option>
<option>Murang'a</option>
<option>Nairobi</option>
<option>Nakuru</option>
<option>Nandi</option>
<option>Narok</option>
<option>Nyamira</option>
<option>Nyandarua</option>
<option>Nyeri</option>
<option>Samburu</option>
<option>Siaya</option>
<option>Taita Taveta</option>
<option>Tana River</option>
<option>Tharaka-Nithi</option>
<option>Trans Nzoia</option>
<option>Turkana</option>
<option>Uasin Gishu</option>
<option>Vihiga</option>
<option>Wajir</option>
<option>West Pokot</option>

</select>

<label>Occupation</label>

<select required>

<option value="">Select Occupation</option>

<option>Student</option>
<option>Business Owner</option>
<option>Self Employed</option>
<option>Employed</option>
<option>Farmer</option>
<option>Teacher</option>
<option>Doctor</option>
<option>Nurse</option>
<option>Engineer</option>
<option>Software Developer</option>
<option>Accountant</option>
<option>Lawyer</option>
<option>Driver</option>
<option>Mechanic</option>
<option>Electrician</option>
<option>Plumber</option>
<option>Carpenter</option>
<option>Welder</option>
<option>Tailor</option>
<option>Hairdresser / Barber</option>
<option>Trader</option>
<option>Salesperson</option>
<option>Hotel Attendant</option>
<option>Chef / Cook</option>
<option>Security Guard</option>
<option>Police Officer</option>
<option>Military Officer</option>
<option>Journalist</option>
<option>Graphic Designer</option>
<option>Photographer</option>
<option>Freelancer</option>
<option>Content Creator</option>
<option>Casual Worker</option>
<option>Unemployed</option>
<option>Retired</option>
<option>Other</option>

</select>

<button type="submit">Continue</button>

</form>

</div>

</div>

<script>
function submitApplication(event){

event.preventDefault();

let name=document.getElementById("applicantName").value;

localStorage.setItem("applicantName",name);

window.location.href="purpose.html";

}
</script>

</body>
</html>
