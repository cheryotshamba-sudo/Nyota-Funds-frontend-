<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NYOTA FUNDS KENYA</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0b6b0b;
    font-family:Arial,sans-serif;
}

.container{
    max-width:450px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
}

h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:30px;
}

.question{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

.option{
    display:flex;
    align-items:center;
    padding:14px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:10px;
    cursor:pointer;
    font-size:17px;
}

.option input{
    margin-right:15px;
    transform:scale(1.3);
}

button{
    width:100%;
    padding:15px;
    margin-top:25px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>NYOTA FUNDS KENYA</h1>

<div class="question">
What will you do with the funds?
</div>

<label class="option">
<input type="radio" name="purpose" value="Starting a Business">
Starting a Business
</label>

<label class="option">
<input type="radio" name="purpose" value="Expanding My Business">
Expanding My Business
</label>

<label class="option">
<input type="radio" name="purpose" value="Education">
Education
</label>

<label class="option">
<input type="radio" name="purpose" value="Agriculture">
Agriculture
</label>

<label class="option">
<input type="radio" name="purpose" value="Buying Equipment">
Buying Equipment
</label>

<label class="option">
<input type="radio" name="purpose" value="Home Improvement">
Home Improvement
</label>

<label class="option">
<input type="radio" name="purpose" value="Personal Development">
Personal Development
</label>

<label class="option">
<input type="radio" name="purpose" value="Other">
Other
</label>

<button onclick="continueNext()">
Continue
</button>

</div>

</div>

<script>

function continueNext(){

let selected=document.querySelector('input[name="purpose"]:checked');

if(!selected){
alert("Please select a purpose.");
return;
}

localStorage.setItem("purpose",selected.value);

window.location.href="amount.html";

}

</script>

</body>

</html>
