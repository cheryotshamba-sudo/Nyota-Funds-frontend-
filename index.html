<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NYOTA Fund Kenya</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b6b0b;
padding:20px;
}

.card{
max-width:500px;
margin:auto;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.header{
padding:30px;
text-align:center;
}

.logo{
width:100%;
max-height:180px;
object-fit:contain;
margin-bottom:20px;
}

h1{
color:#1565c0;
margin-bottom:10px;
}

.subtitle{
color:#333;
line-height:1.7;
margin-bottom:25px;
}

.about{
padding:0 30px;
line-height:1.8;
color:#444;
}

.buttons{
padding:30px;
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin-bottom:15px;
}

.start{
background:#22c55e;
color:#fff;
}

.later{
background:#1565c0;
color:#fff;
}

</style>
</head>

<body>

<div class="card">

<div class="header">
<img <img src="logo.png" alt="Nyota Logo" width="150" style="border:2px solid red;"> 

<h1>NYOTA Fund Kenya</h1>

<p class="subtitle">
Empowering Youth • Supporting Businesses • Strengthening Kenya's Economy
</p>

</div>

<div class="about">

<h2>About the NYOTA Fund</h2>

<p>
NYOTA Fund is a national financial empowerment initiative focused on supporting youth entrepreneurs across Kenya through accessible and affordable funding opportunities.
</p>

</div>

<div class="buttons">

<button class="start" onclick="location.href='apply.html'">
Start Application
</button>

<button class="later">
Apply Later
</button>

</div>

</div>

</body>
</html>
