<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NYOTA FUNDS KENYA</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100vh;
    background:#045a04;
    font-family:Arial,sans-serif;
    color:#fff;
}

.container{
    width:100%;
    min-height:100vh;
}

.card{
    width:100%;
    min-height:100vh;
    padding:20px 15px;
    box-sizing:border-box;
    background:transparent;
}

h1{
    text-align:center;
    color:#1565c0;
    font-size:22px;
    margin:10px 0 25px;
}

.message{
    text-align:center;
    color:#fff;
    font-size:16px;
    line-height:1.8;
    margin-bottom:25px;
}

h2{
    text-align:center;
    color:#1565c0;
    font-size:20px;
    margin-bottom:25px;
}

.amount-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.amount-btn{
    background:#1565c0;
    color:#fff;
    border:none;
    border-radius:15px;
    padding:22px 10px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

.amount-btn:hover,
.amount-btn:focus{
    background:#0d47a1;
}

.amount-btn.selected{
    background:#00c853;
}

#feeDisplay{
    margin-top:30px;
    font-size:20px;
    font-weight:bold;
    color:#fff;
}

.continue-btn{
    width:100%;
    margin-top:35px;
    padding:20px;
    background:#25d366;
    color:#fff;
    border:none;
    border-radius:16px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.continue-btn:hover{
    background:#1ebe5d;
}


</style>

</head>


<body>


<div class="container">

<div class="card">


<h1>NYOTA FUNDS KENYA</h1>


<div class="message">

Congratulations 🎊 <span id="applicantName"></span><br>

You're eligible for NYOTA FUNDs LIMITs.<br>

Kindly choose the amount you want and pay its processing fee to receive.

<div class="amount-grid">

<button class="amount-btn" onclick="selectAmount(22000,this)">Ksh 22,000</button>

<button class="amount-btn" onclick="selectAmount(30000,this)">Ksh 30,000</button>

<button class="amount-btn" onclick="selectAmount(40000,this)">Ksh 40,000</button>

<button class="amount-btn" onclick="selectAmount(50000,this)">Ksh 50,000</button>

<button class="amount-btn" onclick="selectAmount(65000,this)">Ksh 65,000</button>

<button class="amount-btn" onclick="selectAmount(75000,this)">Ksh 75,000</button>

<button class="amount-btn" onclick="selectAmount(85000,this)">Ksh 85,000</button>

<button class="amount-btn" onclick="selectAmount(110000,this)">Ksh 110,000</button>

<button class="amount-btn" onclick="selectAmount(150000,this)">Ksh 150,000</button>

    </div>

<div id="feeDisplay">
Select amount to see processing fee
</div>


<button class="continue-btn" onclick="continueNext()">
Continue
</button>


</div>

</div>



<script>

let applicant = localStorage.getItem("applicantName");

document.getElementById("applicantName").innerHTML =
applicant || "Applicant";


let selectedAmount = 0;


let fees = {
22000:350,
30000:400,
40000:460,
50000:520,
65000:660,
75000:780,
85000:900,
110000:1240,
150000:1500
};


function selectAmount(amount){

selectedAmount = amount;

localStorage.setItem("processingFee", fees[amount]);

document.querySelectorAll(".amount-btn").forEach(btn=>{
    btn.classList.remove("selected");
});

event.target.classList.add("selected");

document.getElementById("feeDisplay").innerHTML =
"Processing Fee: Ksh " + fees[amount];

}

function continueNext(){

if(selectedAmount === 0){

alert("Please select an amount");

return;

}

window.location.href="payment.html";

}

</script>


</body>

</html>
